<!doctype html>
<html lang="en" data-visual-system="radar-unified-v2" data-visual-surface="index">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Radar Reports</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap">
  <style>
    :root {
      --bg-page: #0b0b0f; --bg-card: rgba(28, 26, 34, 0.86); --text-primary: #f4f4f7;
      --text-muted: rgba(244, 244, 247, 0.58); --border-subtle: rgba(244, 244, 247, 0.14);
      --shadow-card: 0 14px 42px rgba(0,0,0,0.34);
      --shadow-card-hover: 0 18px 52px rgba(0,0,0,0.42);
      --accent-teal: #33d6c5; --radius-md: 8px;
      --font-sans: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      margin: 0; padding: 0; background: linear-gradient(180deg, var(--bg-page), #121116 58%, #08080b); color: var(--text-primary); line-height: 1.5;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    .header {
      margin-bottom: 28px; padding-bottom: 20px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .header__title {
      font-size: 28px; font-weight: 700; margin: 0 0 4px 0; letter-spacing: -0.02em;
    }
    .header__timestamp { font-size: 13px; color: var(--text-muted); }
    .reports-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px;
    }
    .report-card {
      background: var(--bg-card); border-radius: var(--radius-md);
      padding: 20px; box-shadow: var(--shadow-card);
      border-left: 4px solid var(--accent-teal);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .report-card:hover { box-shadow: var(--shadow-card-hover); transform: translateY(-1px); }
    .report-card a {
      color: var(--text-primary); text-decoration: none; font-weight: 600; font-size: 15px;
    }
    .report-card a:hover { color: var(--accent-teal); text-decoration: underline; }
    .report-card__date { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
    .empty-state {
      text-align: center; padding: 48px 24px;
      background: var(--bg-card); border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
    }
    .empty-state__icon { font-size: 36px; margin-bottom: 12px; }
    .empty-state__title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .empty-state__message { font-size: 13px; color: var(--text-muted); }
    .footer {
      margin-top: 40px; padding-top: 24px;
      border-top: 1px solid var(--border-subtle);
      text-align: center; font-size: 13px; color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="header__title">Radar Reports</h1>
      <div class="header__timestamp">Generated 2026-04-17T02:39:29.486804+00:00 UTC</div>
    </header>

    
    <div class="reports-grid">
      
      <div class="report-card">
        <a href="weather_mcp_20260417.html">Weather Mcp</a>
        <div class="report-card__date">2026-04-17</div>
      </div>
      
      <div class="report-card">
        <a href="weather_mcp_report.html">Weather Mcp</a>
        
      </div>
      
    </div>
    

    <footer class="footer">
      Radar Reports Index — generated 2026-04-17T02:39:29.486804+00:00 UTC
    </footer>
  </div>
</body>
</html>
